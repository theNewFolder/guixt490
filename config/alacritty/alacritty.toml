[font]
size = 11.0

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[window]
padding = { x = 8, y = 8 }
decorations = "full"
opacity = 0.95

# Modus Vivendi Tinted colors
[colors.primary]
background = "#0d0e1c"
foreground = "#ffffff"

[colors.normal]
black   = "#000000"
red     = "#ff5f59"
green   = "#44bc44"
yellow  = "#d0bc00"
blue    = "#2fafff"
magenta = "#feacd0"
cyan    = "#00d3d0"
white   = "#bfbfbf"

[colors.bright]
black   = "#595959"
red     = "#ef8b50"
green   = "#70b900"
yellow  = "#c0c530"
blue    = "#79a8ff"
magenta = "#b6a0ff"
cyan    = "#6ae4b9"
white   = "#ffffff"
