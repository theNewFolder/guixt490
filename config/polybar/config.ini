[colors]
background = #0d0e1c
foreground = #ffffff
primary = #79a8ff
accent = #79a8ff
success = #44bc44
warning = #d0bc00
error = #ff5f59

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 32
offset-x = 0
offset-y = 0
background = ${colors.background}
foreground = ${colors.foreground}

; Padding and margin
padding-left = 2
padding-right = 2
module-margin = 1

; Fonts
font-0 = JetBrains Mono:style=Regular:size=10;3
font-1 = Font Awesome 6:style=Solid:size=12;3

; Modules
modules-left = xworkspaces
modules-center = cpu memory temperature
modules-right = battery pulseaudio date

; Tray
tray-position = right
tray-padding = 2
tray-maxsize = 28
tray-background = ${colors.background}

; Border
border-size = 0
border-top-size = 3
border-top-color = ${colors.accent}

; Line underline
line-size = 3
line-color = ${colors.accent}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background}
label-active-foreground = ${colors.primary}
label-active-underline = ${colors.accent}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = ${colors.foreground}

label-urgent = %name%
label-urgent-background = ${colors.error}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = #666666
label-empty-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
label = CPU %percentage%%
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.primary}

[module/memory]
type = internal/memory
interval = 2
label = RAM %percentage_used%%
format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.primary}

[module/temperature]
type = internal/temperature
thermal-zone = 0
base-temperature = 20
warn-temperature = 80

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.warning}

format = <ramp> <label>
format-warn = <ramp> <label-warn>

ramp-0 =
ramp-1 =
ramp-2 =
ramp-foreground = ${colors.primary}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 100

label-charging = %percentage%% ⚡
label-discharging = %percentage%%
label-full = 100% ✓

format-charging = <ramp-capacity> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

ramp-capacity-0 =
ramp-capacity-1 =
ramp-capacity-2 =
ramp-capacity-3 =
ramp-capacity-4 =

ramp-capacity-0-foreground = ${colors.error}
ramp-capacity-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

format-muted = <label-muted>
label-muted = 󰖁 Muted
label-muted-foreground = #666666

ramp-volume-0 =
ramp-volume-1 =
ramp-volume-2 =
ramp-volume-foreground = ${colors.primary}

click-right = pavucontrol

[module/date]
type = internal/date
interval = 1

date = %A, %B %d
time = %H:%M:%S

label = %date%  %time%
label-foreground = ${colors.primary}
