#################################
#             PICOM              #
#################################

#################################
#           Backend              #
#################################
backend = "glx";
# Fallback to xrender if GLX is not available
glx-no-stencil = true;
glx-use-copysubbuffermesa = true;

#################################
#         VSync                  #
#################################
vsync = true;

#################################
#         Fading                 #
#################################
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
#       Shadow Settings          #
#################################
shadow = false;

#################################
#       Opacity Settings         #
#################################
inactive-opacity = 0.92;
active-opacity = 1.0;
inactive-opacity-override = true;

#################################
#       Corner Radius            #
#################################
corner-radius = 8;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'notification'",
];

#################################
#         Blur                   #
#################################
blur = {
  method = "none";
};

#################################
#        Exclusions              #
#################################
wintypes:
{
  dock = {
    shadow = false;
    blur-background = false;
  };
  desktop = {
    shadow = false;
    blur-background = false;
  };
  notification = {
    shadow = false;
    blur-background = false;
  };
};
